<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Ba chế độ đầu ra</title><desc id="desc">Minh họa tải từng file, nén ZIP và chuyển sang Drive đích.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#06101f"/><stop offset="1" stop-color="#0b1f3b"/></linearGradient><linearGradient id="brand"><stop stop-color="#2d69ff"/><stop offset="1" stop-color="#56d9ff"/></linearGradient><filter id="shadow"><feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000611" flood-opacity=".55"/></filter><style>.t{font-family:Inter,Arial;fill:#f4f8ff}.m{fill:#8fa2bd}.line{stroke:#56d9ff;stroke-width:3;fill:none}</style></defs>
  <rect width="1200" height="675" rx="30" fill="url(#bg)"/><text x="58" y="76" class="t" font-size="17" font-weight="850">CHỌN ĐẦU RA</text><text x="58" y="119" class="t" font-size="34" font-weight="850">Bạn muốn nhận kết quả theo cách nào?</text>
  <g transform="translate(58 164)"><g filter="url(#shadow)"><rect width="338" height="306" rx="24" fill="#0d213c" stroke="#56d9ff" stroke-width="2"/><circle cx="296" cy="36" r="14" fill="#163b35"/><text x="296" y="42" text-anchor="middle" fill="#36d99d" font-family="Arial" font-weight="900">✓</text><rect x="28" y="30" width="62" height="62" rx="18" fill="url(#brand)"/><text x="59" y="70" text-anchor="middle" class="t" font-size="29" font-weight="900">↓</text><text x="28" y="132" class="t" font-size="23" font-weight="850">Tải từng file</text><text x="28" y="164" class="m" font-size="14">Chủ động nhận từng file sau xử lý.</text><line x1="28" y1="195" x2="310" y2="195" stroke="#29425f"/><text x="28" y="230" fill="#36d99d" font-family="Inter,Arial" font-size="14">✓ Dễ kiểm soát</text><text x="28" y="262" class="m" font-size="14">✓ Phù hợp ít file</text></g><g transform="translate(368)"><rect width="338" height="306" rx="24" fill="#0b172b" stroke="#29425f"/><rect x="28" y="30" width="62" height="62" rx="18" fill="#152743"/><text x="59" y="70" text-anchor="middle" fill="#56d9ff" font-family="Inter,Arial" font-size="26" font-weight="900">◫</text><text x="28" y="132" class="t" font-size="23" font-weight="850">Nén ZIP</text><text x="28" y="164" class="m" font-size="14">Gom toàn bộ thành một file duy nhất.</text><line x1="28" y1="195" x2="310" y2="195" stroke="#29425f"/><text x="28" y="230" class="m" font-size="14">✓ Tiện lưu trữ</text><text x="28" y="262" class="m" font-size="14">✓ Phù hợp nhiều file</text></g><g transform="translate(736)"><rect width="338" height="306" rx="24" fill="#0b172b" stroke="#29425f"/><rect x="28" y="30" width="62" height="62" rx="18" fill="#152743"/><text x="59" y="70" text-anchor="middle" fill="#56d9ff" font-family="Inter,Arial" font-size="26" font-weight="900">⇄</text><text x="28" y="132" class="t" font-size="23" font-weight="850">Drive → Drive</text><text x="28" y="164" class="m" font-size="14">Chuyển trực tiếp sang tài khoản đích.</text><line x1="28" y1="195" x2="310" y2="195" stroke="#29425f"/><text x="28" y="230" class="m" font-size="14">✓ Không qua thiết bị</text><text x="28" y="262" class="m" font-size="14">✓ Giữ cấu trúc thư mục</text></g></g>
  <rect x="58" y="495" width="1074" height="92" rx="18" fill="#0b172b" stroke="#29425f"/><rect x="82" y="519" width="44" height="44" rx="13" fill="#132e50"/><text x="104" y="548" text-anchor="middle" fill="#56d9ff" font-family="Inter,Arial" font-size="21" font-weight="900">↓</text><text x="146" y="535" class="t" font-size="16" font-weight="800">Tải từng file đang được chọn</text><text x="146" y="560" class="m" font-size="13">Phù hợp khi bạn muốn kiểm soát từng file tải về thiết bị.</text><text x="1092" y="548" text-anchor="end" fill="#56d9ff" font-family="Inter,Arial" font-size="13" font-weight="800">Xem hướng dẫn →</text>
  <circle cx="363" cy="188" r="20" fill="#56d9ff"/><text x="363" y="195" text-anchor="middle" fill="#06101f" font-family="Inter,Arial" font-weight="900">1</text><path d="M343 188h-22" class="line"/><circle cx="785" cy="454" r="20" fill="#56d9ff"/><text x="785" y="461" text-anchor="middle" fill="#06101f" font-family="Inter,Arial" font-weight="900">2</text><path d="M785 434v-44" class="line"/><circle cx="1110" cy="616" r="20" fill="#56d9ff"/><text x="1110" y="623" text-anchor="middle" fill="#06101f" font-family="Inter,Arial" font-weight="900">3</text><path d="M1110 596v-33" class="line"/>
</svg>
