  <rect width="1200" height="675" rx="30" fill="url(#bg)"/><text x="62" y="75" class="t" font-size="18" font-weight="800">BẢNG GIÁ</text><text x="62" y="120" class="t" font-size="34" font-weight="850">Chọn thời hạn phù hợp</text><rect x="920" y="62" width="218" height="48" rx="24" fill="#0d1b30" stroke="#29425f"/><text x="944" y="91" class="m" font-size="14">Số dư</text><text x="1112" y="91" text-anchor="end" class="t" font-size="17" font-weight="800">350.000đ</text>
