<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Chọn gói AutoTool Pro</title><desc id="desc">Minh họa các thẻ gói, số dư và nút mua gói.</desc>
