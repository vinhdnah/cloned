<text x="24" y="186" class="m" font-size="14">✓ Không hết hạn</text><text x="24" y="218" class="m" font-size="14">✓ Mọi chế độ đầu ra</text><text x="24" y="250" class="m" font-size="14">✓ Ưu tiên hỗ trợ</text><rect x="24" y="348" width="194" height="52" rx="14" fill="#14243d" stroke="#29425f"/><text x="121" y="380" text-anchor="middle" class="t" font-size="16" font-weight="800">Mua gói</text></g></g>
