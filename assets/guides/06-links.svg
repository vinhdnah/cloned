  <line x1="106" y1="507" x2="1092" y2="507" stroke="#29425f"/><text x="106" y="540" class="m" font-size="12">TÊN KẾT QUẢ</text><rect x="106" y="554" width="600" height="48" rx="13" fill="#07101f" stroke="#29425f"/><text x="128" y="584" class="t" font-size="16">khoa_hoc_thang_7</text><rect x="728" y="546" width="364" height="56" rx="14" fill="url(#brand)"/><text x="910" y="581" text-anchor="middle" class="t" font-size="17" font-weight="900">Bắt đầu xử lý →</text>
