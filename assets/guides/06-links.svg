<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Dán và kiểm tra link Drive</title><desc id="desc">Minh họa ô nhập link, bộ đếm và nút bắt đầu xử lý.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#06101f"/><stop offset="1" stop-color="#0b1e37"/></linearGradient><linearGradient id="brand"><stop stop-color="#2d69ff"/><stop offset="1" stop-color="#56d9ff"/></linearGradient><style>.t{font-family:Inter,Arial;fill:#f4f8ff}.m{fill:#8fa2bd}.line{stroke:#56d9ff;stroke-width:3;fill:none}</style></defs>
  <rect width="1200" height="675" rx="30" fill="url(#bg)"/><rect x="70" y="50" width="1060" height="575" rx="26" fill="#0b172b" stroke="#315277"/><text x="106" y="94" fill="#56d9ff" font-family="Inter,Arial" font-size="12" font-weight="900">BƯỚC 2</text><text x="106" y="130" class="t" font-size="27" font-weight="850">Thêm liên kết Google Drive</text><rect x="928" y="82" width="164" height="42" rx="12" fill="#14243d" stroke="#29425f"/><text x="1010" y="108" text-anchor="middle" class="t" font-size="13" font-weight="800">Quét cả thư mục</text><text x="106" y="164" class="m" font-size="14">Mỗi dòng một liên kết. Hệ thống tự loại dòng trống và phát hiện trùng.</text>
  <rect x="106" y="190" width="986" height="242" rx="18" fill="#050c18" stroke="#29425f"/><text x="132" y="232" fill="#c7d7ed" font-family="ui-monospace,Consolas" font-size="17">https://drive.google.com/file/d/1A2B3C...</text><text x="132" y="276" fill="#c7d7ed" font-family="ui-monospace,Consolas" font-size="17">https://drive.google.com/file/d/4D5E6F...</text><text x="132" y="320" fill="#c7d7ed" font-family="ui-monospace,Consolas" font-size="17">https://drive.google.com/drive/folders/7G8H...</text><text x="132" y="379" class="m" font-size="14">Mỗi link nằm trên một dòng riêng</text>
