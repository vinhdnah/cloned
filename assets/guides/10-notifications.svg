  <g filter="url(#shadow)"><rect x="638" y="126" width="486" height="492" rx="24" fill="#08162a" stroke="#315277"/><text x="672" y="164" fill="#56d9ff" font-family="Inter,Arial" font-size="10" font-weight="900">CẬP NHẬT TỨC THỜI</text><text x="672" y="194" class="t" font-size="23" font-weight="850">Thông báo</text><text x="1086" y="184" text-anchor="end" fill="#56d9ff" font-family="Inter,Arial" font-size="11" font-weight="800">Đã đọc hết</text><line x1="638" y1="214" x2="1124" y2="214" stroke="#29425f"/><rect x="656" y="232" width="450" height="78" rx="16" fill="#0d2934" stroke="#56d9ff" stroke-opacity=".28"/><text x="676" y="260" class="t" font-size="13" font-weight="800">Nhận báo ngay cả khi chuyển tab</text><text x="676" y="282" class="m" font-size="11">Bật thông báo trình duyệt cho job và giao dịch.</text><rect x="1028" y="249" width="58" height="36" rx="10" fill="#142d4e"/><text x="1057" y="272" text-anchor="middle" fill="#56d9ff" font-family="Inter,Arial" font-size="11" font-weight="850">Bật</text>
