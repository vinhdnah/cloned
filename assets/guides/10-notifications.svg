  <text x="74" y="178" class="t" font-size="28" font-weight="850">Mọi cập nhật quan trọng</text><text x="74" y="214" class="m" font-size="15">được gom lại ở góc trên bên phải.</text><rect x="74" y="258" width="480" height="74" rx="17" fill="#0b172b" stroke="#29425f"/><text x="98" y="287" class="t" font-size="14" font-weight="800">✦  Telegram</text><text x="98" y="312" class="m" font-size="12">Nhập Chat ID để nhận tin từ bot.</text><rect x="74" y="348" width="480" height="74" rx="17" fill="#0b172b" stroke="#29425f"/><text x="98" y="377" class="t" font-size="14" font-weight="800">☾  Giao diện sáng / tối</text><text x="98" y="402" class="m" font-size="12">Lưu tự động theo thiết bị.</text><rect x="74" y="438" width="480" height="74" rx="17" fill="#0b172b" stroke="#29425f"/><text x="98" y="467" class="t" font-size="14" font-weight="800">⚙  Đổi mật khẩu</text><text x="98" y="492" class="m" font-size="12">Yêu cầu mật khẩu cũ và mật khẩu mới.</text>
